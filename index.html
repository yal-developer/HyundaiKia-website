<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hyundai & Kia Cikampek</title>
    
    <style>
        .logo {
            display: flex;
            align-items: center;
        }
        .Hyundai-logo {
            width: 150px;
            vertical-align: middle;
        }
        
        .Kia-logo {
            width: 76.8px;
            margin-left: 3.5px;
            margin-bottom: 0.5px;
            vertical-align: middle;
        }
        
        .hero {
            height: 90vh;
            background: url("https://cdn.zeebiz.com/sites/default/files/2022/08/23/196461-hyundai-and-kia.png") center no-repeat;
            display: flex;
            justify-content: flex-start;
            flex-direction: column;
            text-align: center;
            align-items: center;
            padding-bottom: 200px;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 20px;
            color: black;
        }

        .hero p {
            font-size: 20px;
            color: black;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        .container-tombol {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }
        .semua-tombol button {
            width: 100px;
            text-align: center;
        }
        .showroom {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            font-size: 12px;
        }
    
        .container {
            display: flex;
            gap: 80px;
            align-items: flex-start;
        }
        
        .car {
            width: 320px;
        
        }
        
        .car-image {
            width: 100%;
            border-radius: 10px;
        }
        
        .website {
            color: black;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
            text-decoration: none;
            font-size: 8px;
            display: block;
            margin-top: 20px;
            margin-left: 30px;
        }
        
        .car-type {
            color: black;
            background: none;
            font-size: 30px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            margin-top: 10px;
            margin-left: 30px;
        }
        
        .car-price {
            color: black;
            background: none;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            margin-top: -20px;
            font-size: 13px;
            margin-left: 35px;
        }
        
        .learn-more {
            cursor: pointer;
            background-color:white;
            border-color: rgb(0, 0, 0);
            border-radius: 20px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-style: solid;
            font-size: 10px;
            height: 30px;
            width: 70px;
            margin-left: 110px;
            transition: background-color 0.15s;
        }
        
        .learn-more:hover {
            background-color: rgb(0, 0, 0);
            color: white;
        }
        
        .learn-more:active {
            opacity: 0.5;
        
        }
        
        .cart {
            cursor: pointer;
            background-color: white;
            border-color: rgb(0, 0, 0);
            border-radius: 20px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            font-size: 10px;
            border-style: solid;
            height: 30px;
            width: 70px;
            transition: background-color 0.15s;
        }
        
        .cart:hover {
            background-color: rgb(0, 0, 0);
            color: white;
        }
        
        .cart:active {
            opacity: 0.5;
        
        }
    </style>
</head>

<body>
    <div class="logo">
        <img src="https://freepnglogo.com/images/all_img/1720112618hyundai-logo-png-transparent-image.png" class="Hyundai-logo">
        <img src="https://www.designyourway.net/blog/wp-content/uploads/2023/06/Logo-1-2.jpg" class="Kia-logo">
    </div>

    <p class="showroom">
        Hyundai & Kia Cikampek 
    </p>

    <div class="container-tombol">
        <button class="semua-tombol">
            Produk Hyundai & kia
        </button>

        <button class="semua-tombol">
            Tentang kami
        </button>

        <button class="semua-tombol">
            Service resmi
        </button>

        <button class="semua tombol">
            Spare parts
        </button>
    </div>

    <section class="hero">
        <h1>안녕하세요!</h1>
        <p>Selamat datang di Hyundai & Kia Cikampek</p>
    </section>
    
    <div class="container">
        <div class="car">
            <img src="https://www.rushlane.com/wp-content/uploads/2024/12/2025-hyundai-palisade-suv-launch-6-1068x601.jpeg" class="car-image">
            <a href="https://www.hyundai.com/worldwide/en" target="_blank" class="website">
                Kembali ke website Hyundai
            </a>
            
            <p class="car-type">
                The all-new Palisade
            </p>
            
            <p class="car-price">
                Dimulai dari Rp. 1,131,900,000
            </p>
            
            <a href="" target="_blank">
                <button class="learn-more">
                    Hubungi sales
                </button>
            </a>
            
            <button class="cart">
                Pelajari lebih lanjut
            </button>
        </div>
        
        
        <div class="car">
            
            <img src="https://insidethehood.com/wp-content/uploads/2023/12/2026-Kia-Carnival-Colors.jpg" class="car-image">
            <a href="https://worldwide.kia.com/int" target="_blank" class="website">
                Kembali ke website Kia
            </a>
            
            <p class="car-type">
                Kia Carnival Hybrid 2026
            </p>
        
            <p class="car-price">
                Dimulai dari Rp. 1,039,000,000
            </p>
        
            <a href="https://www.kia.com/id/id/showroom/carnival/features.html" target="_blank">
                <button class="learn-more">
                    Hubungi sales
                </button>
            </a>
            
            <button class="cart">
                Pelajari lebih lanjut
            </button>
        </div>
    </div>

</body>
</html>
