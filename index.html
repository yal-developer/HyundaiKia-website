<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hyundai & Kia Cikampek</title>
    
    <style>
        .Hyundai-logo {
            width: 150px;
            vertical-align: middle;
        }
        
        .Kia-logo {
            width: 76.8px;
            margin-left: 3.5px;
            margin-bottom: 0.5px;
            vertical-align: middle;
        }
        
        .showroom {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            font-size: 12px;
        }
        
        .container {
            display: flex;
            gap: 80px;
            align-items: flex-start;
        }
        
        .car {
            width: 320px;
        
        }
        
        .car-image {
            width: 100%;
            border-radius: 10px;
        }
        
        .website {
            color: black;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
            text-decoration: none;
            font-size: 8px;
            display: block;
            margin-top: 20px;
            margin-left: 30px;
        }
        
        .car-type {
            color: black;
            background: none;
            font-size: 30px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            margin-top: 10px;
            margin-left: 30px;
        }
        
        .car-price {
            color: black;
            background: none;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            margin-top: -20px;
            font-size: 13px;
            margin-left: 35px;
        }
        
        .learn-more {
            cursor: pointer;
            background-color:white;
            border-color: rgb(0, 0, 0);
            border-radius: 20px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-style: solid;
            font-size: 10px;
            height: 30px;
            width: 70px;
            margin-left: 110px;
            transition: background-color 0.15s;
        }
        
        .learn-more:hover {
            background-color: rgb(0, 0, 0);
            color: white;
        }
        
        .learn-more:active {
            opacity: 0.5;
        
        }
        
        .cart {
            cursor: pointer;
            background-color: white;
            border-color: rgb(0, 0, 0);
            border-radius: 20px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            font-size: 10px;
            border-style: solid;
            height: 30px;
            width: 70px;
            transition: background-color 0.15s;
        }
        
        .cart:hover {
            background-color: rgb(0, 0, 0);
            color: white;
        }
        
        .cart:active {
            opacity: 0.5;
        
        }
    </style>
</head>

<body>
    <div>
        <img src="https://freepnglogo.com/images/all_img/1720112618hyundai-logo-png-transparent-image.png" class="Hyundai-logo">
        <img src="https://www.designyourway.net/blog/wp-content/uploads/2023/06/Logo-1-2.jpg" class="Kia-logo">
    </div>

    <p class="showroom">
        Hyundai & Kia Purwakarta Jl. Veteran
    </p>

    <section class="hero">
        <h1>안녕하세요!</h1>
    </section>
    
    <div class="container">
        <div class="car">
            <img src="https://www.rushlane.com/wp-content/uploads/2024/12/2025-hyundai-palisade-suv-launch-6-1068x601.jpeg" class="car-image">
            <a href="https://www.hyundai.com/worldwide/en" target="_blank" class="website">
                Back to Hyundai website
            </a>
            
            <p class="car-type">
                The all-new Palisade
            </p>
            
            <p class="car-price">
                Starting from Rp. 1,131,900,000
            </p>
            
            <a href="https://www.hyundai.com/id/id/find-a-car/all-new-palisade-hybrid/highlights#none" target="_blank">
                <button class="learn-more">
                    Learn more
                </button>
            </a>
            <button class="cart">
                Add to cart
            </button>
        </div>
        
        
        <div class="car">
            
            <img src="https://insidethehood.com/wp-content/uploads/2023/12/2026-Kia-Carnival-Colors.jpg" class="car-image">
            <a href="https://worldwide.kia.com/int" target="_blank" class="website">
                Back to Kia website
            </a>
            
            <p class="car-type">
                Kia Carnival Hybrid 2026
            </p>
        
            <p class="car-price">
                Starting from Rp. 1,039,000,000
            </p>
        
            <a href="https://www.kia.com/id/id/showroom/carnival/features.html" target="_blank">
                <button class="learn-more">
                    Learn more
                </button>
            </a>
            
            <button class="cart">
                Add to cart
            </button>
        </div>
    </div>

</body>
</html>
