<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hyundai & Kia Cikampek</title>
    <meta name="viewport" content="width=device-width", initial-scale="1.0">
    <style>
        
        .Hyundai-logo {
            width: 150px;
            vertical-align: middle;
        }
        
        .Kia-logo {
            width: 76.8px;
            margin-left: 3.5px;
            margin-bottom: 0.5px;
            vertical-align: middle;
        }
        
        .background {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url("https://newsimg.koreatimes.co.kr/2024/12/10/36f16658-c88b-4455-ad08-96edf8c1eb02.jpg") center no-repeat;
        }
       
        .background h1 {
            font-size: 50px;
            margin-bottom: 20px;
            color: white;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
        }

        .background p {
            font-size: 20px;
            color: white;
            -webkit-text-stroke: 1px black;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items:center;
            gap: 15px;
        }

        .container-tombol {
            display: flex;
            gap: 10px;
        }

        .container-tombol a {
            text-decoration: none;
        }

        .container-tombol button {
            width: 100px;
            text-align: center;
        }

        .gambar {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px;
        }

        .gambar img{
            max-width: 700px;
            height: auto;
        }

        .kendaraan {
            color: black;
            background: none;
            font-size: 15px;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
        }

        .container-tombol {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .semua-tombol {
            width: 100px;
            text-align: center;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            text-decoration: none;
            background: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .showroom {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            font-size: 12px;
        }
    
        .container {
            display: flex;
            gap: 80px;
            align-items: flex-start;
        }
        
        .car {
            width: 320px;
        
        }
        
        .car-image {
            width: 100%;
            border-radius: 10px;
        }
        
        .website {
            color: black;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bolder;
            text-decoration: none;
            font-size: 8px;
            display: block;
            margin-top: 20px;
            margin-left: 30px;
        }
        
        .car-type {
            color: black;
            background: none;
            font-size: 30px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            margin-top: 10px;
            margin-left: 30px;
        }
        
        .car-price {
            color: black;
            background: none;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            margin-top: -20px;
            font-size: 13px;
            margin-left: 35px;
        }
        
        .learn-more {
            cursor: pointer;
            background-color:white;
            border-color: rgb(0, 0, 0);
            border-radius: 20px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-style: solid;
            font-size: 10px;
            height: 30px;
            width: 70px;
            margin-left: 110px;
            transition: background-color 0.15s;
        }
        
        .learn-more:hover {
            background-color: rgb(0, 0, 0);
            color: white;
        }
        
        .learn-more:active {
            opacity: 0.5;
        
        }
        
        .cart {
            cursor: pointer;
            background-color: white;
            border-color: rgb(0, 0, 0);
            border-radius: 20px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            font-size: 10px;
            border-style: solid;
            height: 30px;
            width: 70px;
            transition: background-color 0.15s;
        }
        
        .cart:hover {
            background-color: rgb(0, 0, 0);
            color: white;
        }
        
        .cart:active {
            opacity: 0.5;
        
        }

        img {
            max-width: 100%;
            height: auto;
        }

        html {
            scroll-behavior: smooth;
        }

        .menu-icon {
            display: none;
            font-size: 30px;
            cursor: pointer;
        }

        #menu-toggle {
            display: none;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .container-tombol {
                display: none;
                flex-direction: column;
                width: 100%;
            }

            .semua-tombol {
                width: 80%;
                margin: 10px 0;
            }

            .car-image {
                width: 100%;
                height: auto;
            }

            .gambar img {
                width: 80%;
            }

            #menu-toggle:checked + .menu-icon + .container-tombol {
                display: flex;
            }

            .menu-icon {
                display: block;
                font-size: 28px;
                cursor: pointer;
            }
        }
    </style>
</head>

<body>

<div class="header">
    <div class="logo">
        <img src="https://freepnglogo.com/images/all_img/1720112618hyundai-logo-png-transparent-image.png" class="Hyundai-logo">
        <img src="https://www.designyourway.net/blog/wp-content/uploads/2023/06/Logo-1-2.jpg" class="Kia-logo">
    </div>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">=</label>
    
    <div class="container-tombol">
       
        <a href="#kendaraan">
            <button class="semua-tombol">
                Kendaraan
            </button>
        </a>

        <a href="">
            <button class="semua-tombol">
                Tentang Kami
            </button>
        </a>

        <a href="">
            <button class="semua-tombol">
                Service resmi
            </button>
        </a>

        <a href="">
            <button class="semua-tombol">
                Spare parts
            </button>
        </a>
    </div>
</div>

     <p class="showroom">
        PT. Yusuf Al Ghifari Motors 
    </p>

    <section class="background">
        <h1>안녕하세요!</h1>
        <p>Selamat datang di Hyundai & Kia Cikampek</p>
    </section>

    <div class="gambar">
        <img src="https://cdn.zeebiz.com/sites/default/files/2022/08/23/196461-hyundai-and-kia.png">
    </div>

    <div class="kendaraan">
        <div id="kendaraan">
            <h1>Kendaraan</h1>
        </div>
    </div>
    
    <div class="container">
        <div class="car">
            <img src="https://www.rushlane.com/wp-content/uploads/2024/12/2025-hyundai-palisade-suv-launch-6-1068x601.jpeg" class="car-image">
            <a href="https://www.hyundai.com/worldwide/en" target="_blank" class="website">
                Kembali ke website Hyundai
            </a>
            
            <p class="car-type">
                The all-new Palisade
            </p>
            
            <p class="car-price">
                Dimulai dari Rp. 1,131,900,000
            </p>
            
            <a href="" target="_blank">
                <button class="learn-more">
                    Hubungi sales
                </button>
            </a>
            
            <button class="cart">
                Pelajari lebih lanjut
            </button>
        </div>
        
        
        <div class="car">
            
            <img src="https://insidethehood.com/wp-content/uploads/2023/12/2026-Kia-Carnival-Colors.jpg" class="car-image">
            <a href="https://worldwide.kia.com/int" target="_blank" class="website">
                Kembali ke website Kia
            </a>
            
            <p class="car-type">
                Kia Carnival Hybrid 2026
            </p>
        
            <p class="car-price">
                Dimulai dari Rp. 1,039,000,000
            </p>
        
            <a href="https://www.kia.com/id/id/showroom/carnival/features.html" target="_blank">
                <button class="learn-more">
                    Hubungi sales
                </button>
            </a>
            
            <button class="cart">
                Pelajari lebih lanjut
            </button>
        </div>
    </div>

</body>
</html>
